---
apiVersion: kubernetes.m.crossplane.io/v1alpha1
kind: Object
metadata:
    annotations:
        gotemplating.fn.crossplane.io/composition-resource-name: elasticsearch-observer
    name: {{ $searchName }}-observer
spec:
    forProvider:
        manifest:
            apiVersion: elasticsearch.k8s.elastic.co/v1
            kind: Elasticsearch
            metadata:
                name: {{ $searchName }}
                namespace: {{ $searchNamespace }}
    managementPolicies: ["Observe"]
---
apiVersion: kubernetes.m.crossplane.io/v1alpha1
kind: Object
metadata:
    annotations:
        gotemplating.fn.crossplane.io/composition-resource-name: elasticsearch-secret-observer
    name: {{ $searchSecretName }}-observer
spec:
    forProvider:
        manifest:
            apiVersion: v1
            kind: Secret
            metadata:
                name: {{ $searchSecretName }}
                namespace: {{ $searchNamespace }}
    managementPolicies: ["Observe"]
---
{{- $isSearchReady := false -}}
{{- $password := "" -}}
{{- if .observed.resources -}}
    {{- if (index .observed.resources "elasticsearch-observer") -}}
        {{- $es := index .observed.resources "elasticsearch-observer" -}}
        {{- $status := $es.resource.status.health | default "" -}}
        {{- if or (eq $status "green") (eq $status "yellow") -}}
            {{- $isSearchReady = true -}}
        {{- end -}}
    {{- end -}}
    {{- if (index .observed.resources "elasticsearch-secret-observer") -}}
        {{- $secret := index .observed.resources "elasticsearch-secret-observer" -}}
        {{- $password = index $secret.resource.data "elastic" | default "" -}}
    {{- end -}}
{{- end -}}
{{- if and $isSearchReady $password }}
apiVersion: kubernetes.m.crossplane.io/v1alpha1
kind: Object
metadata:
    annotations:
        crossplane.io/external-name: elasticsearch-connection-details
        gotemplating.fn.crossplane.io/composition-resource-name: elasticsearch-connection-details-secret
    name: {{ $xr.metadata.name }}-elasticsearch-connection-details-secret
spec:
    forProvider:
        manifest:
            apiVersion: v1
            kind: Secret
            metadata:
                name: elasticsearch-connection-details
                namespace: {{ $namespace }}
            data:
                ELASTICSEARCH_DEFAULT_PASSWORD: {{ $password }}
            stringData:
                ELASTICSEARCH_DEFAULT_PASSWORD_SECRET_NAME: {{ $searchSecretName | quote }}
                ELASTICSEARCH_DEFAULT_USERNAME: elastic
                ELASTICSEARCH_URL: http://{{ $searchName }}-es-http.{{ $searchNamespace }}.svc:9200
            type: Opaque
    managementPolicies: {{ $managementPolicies }}
{{- end }}
